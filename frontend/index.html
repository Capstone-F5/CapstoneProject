<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배리어프리 키오스크 - F5</title>
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f8f9fa;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 20px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* UI Modes */
        #touch-mode { width: 100%; max-width: 800px; padding: 20px; }
        #voice-mode { display: none; text-align: center; }
        
        /* Feedback Visualization */
        .wave-container { width: 300px; height: 100px; display: flex; align-items: center; justify-content: center; }
        .wave-bar { width: 10px; height: 20px; background: var(--primary-color); margin: 2px; border-radius: 5px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { height: 20px; } 50% { height: 60px; } }

        /* Menu Grid */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .menu-item { background: white; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .menu-item:hover { border-color: var(--primary-color); }

        /* Controls */
        .mode-switch { position: fixed; bottom: 30px; right: 30px; padding: 15px 30px; border-radius: 50px; background: var(--primary-color); color: white; border: none; font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <header>
        <h1>F5 Intelligent Kiosk</h1>
        <div id="status">🎤 음성 인식 대기 중...</div>
    </header>

    <main>
        <!-- 일반 키오스크 모드 -->
        <div id="touch-mode">
            <h2>메뉴 선택</h2>
            <div class="menu-grid">
                <div class="menu-item">☕ 아메리카노</div>
                <div class="menu-item">🥤 카페라떼</div>
                <div class="menu-item">🍵 녹차</div>
                <!-- ... 추가 메뉴 ... -->
            </div>
        </div>

        <!-- 음성 우선 모드 피드백 -->
        <div id="voice-mode">
            <h2 id="transcript">"아이스 아메리카노 하나 주세요"</h2>
            <div class="wave-container">
                <div class="wave-bar"></div>
                <div class="wave-bar" style="animation-delay: 0.1s"></div>
                <div class="wave-bar" style="animation-delay: 0.2s"></div>
                <div class="wave-bar" style="animation-delay: 0.3s"></div>
            </div>
            <p>실시간으로 고객님의 요청을 분석 중입니다.</p>
        </div>
    </main>

    <button class="mode-switch" onclick="toggleMode()">🔄 모드 전환 (터치/음성)</button>

    <script>
        let isVoiceMode = false;
        function toggleMode() {
            isVoiceMode = !isVoiceMode;
            document.getElementById('touch-mode').style.display = isVoiceMode ? 'none' : 'block';
            document.getElementById('voice-mode').style.display = isVoiceMode ? 'block' : 'none';
        }
    </script>
</body>
</html>
